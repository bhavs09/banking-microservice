name: Transaction Service CI-CD

on:
  push:
    branches:
      - main
    paths:
      - 'transaction-service/**'

jobs:
  build-and-deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build Transaction Service
        run: mvn package -f transaction-service/pom.xml

      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/transaction-service:${{ github.run_number }} transaction-service/

      - name: Push to DockerHub
        run: docker push ${{ secrets.DOCKER_USERNAME }}/transaction-service:${{ github.run_number }}

      - name: Configure Kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > ~/.kube/config

      - name: Deploy to Kubernetes
        run: |
          kubectl apply -f k8s/transaction-service/
          kubectl set image deployment/transaction-service transaction-service=${{ secrets.DOCKER_USERNAME }}/transaction-service:${{ github.run_number }}
